name = "ayura-os-db"
project_id = "ayura-local"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

# Edge Functions configuration (free tier ready)
[edge_runtime]
enabled = true
port = 54324
policy = "oneshot"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = false # Only admins can invite staff

[auth.external.apple]
enabled = false
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_SECRET)"
